<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMInventary - Editar Vendedor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar-dark { background-color: #0f172a; }
        .gold-gradient { background: linear-gradient(135deg, #c9a84c 0%, #e8d5a3 100%); }
        .corporate-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <aside class="w-72 sidebar-dark text-white flex flex-col shadow-2xl">
        <div class="p-8 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <img src="{{ url_for('static', filename='img/logo.png') }}" class="w-10 h-10 rounded-xl shadow-lg object-cover" onerror="this.src='https://ui-avatars.com/api/?name=AMI&background=c9a84c&color=fff'">
                <div>
                    <h2 class="text-xl font-bold tracking-tight">AMInventary</h2>
                    <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Edición de Datos</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 py-8 space-y-2">
            <a href="{{ url_for('admin.directorio') }}" class="flex items-center gap-3 p-4 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-white transition-all group">
                <i data-lucide="arrow-left" class="w-5 h-5 group-hover:text-[#c9a84c]"></i> Volver al Directorio
            </a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto bg-[#f8fafc] flex items-center justify-center p-10">
        <div class="bg-white w-full max-w-2xl rounded-3xl border border-gray-100 corporate-shadow p-10">
            <div class="mb-10 border-b border-gray-100 pb-6 flex items-center gap-4">
                <div class="p-3 rounded-2xl bg-amber-50 text-[#c9a84c]">
                    <i data-lucide="user-edit" class="w-6 h-6"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-extrabold text-slate-800">Editar Vendedor</h2>
                    <p class="text-sm text-gray-400">Actualice el perfil comercial de {{ vendedor.nombre }}.</p>
                </div>
            </div>

            <form class="space-y-6" method="POST">
                <div class="grid grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Cédula de Identidad</label>
                        <div class="grid grid-cols-[1fr_2fr] gap-2">
                            <select name="cedula_tipo" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all appearance-none">
                                <option value="" disabled {% if not vendedor.cedula %}selected{% endif %}>Tipo</option>
                                <option value="V" {% if vendedor.cedula.split('-')[0] == 'V' %}selected{% endif %}>V</option>
                                <option value="J" {% if vendedor.cedula.split('-')[0] == 'J' %}selected{% endif %}>J</option>
                                <option value="E" {% if vendedor.cedula.split('-')[0] == 'E' %}selected{% endif %}>E</option>
                                <option value="G" {% if vendedor.cedula.split('-')[0] == 'G' %}selected{% endif %}>G</option>
                            </select>
                            <input type="text" name="cedula_numero" required inputmode="numeric" pattern="\d{8,9}" maxlength="{{ 8 if vendedor.cedula.split('-')[0] == 'V' else 9 }}" value="{{ vendedor.cedula.split('-')[1] }}"
                                class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all">
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Nombre de Usuario</label>
                        <input type="text" name="usuario" value="{{ vendedor.usuario }}" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all">
                    </div>
                    <div class="flex flex-col gap-2 col-span-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Nombre Completo</label>
                        <input type="text" name="nombre" value="{{ vendedor.nombre }}" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Nueva Contraseña (Opcional)</label>
                        <input type="password" name="password" placeholder="Dejar en blanco para mantener" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all">
                    </div>
                    
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Rol en el Sistema</label>
                        <select name="rol" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all appearance-none">
                            <option value="vendedor" {% if vendedor.rol == 'vendedor' %}selected{% endif %}>Vendedor Estándar</option>
                            <option value="admin" {% if vendedor.rol == 'admin' %}selected{% endif %}>Administrador</option>
                        </select>
                    </div>

                    <div class="flex flex-col gap-2 col-span-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Zona de Trabajo</label>
                        <select name="zona" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all appearance-none">
                            <option value="Amazonas" {% if vendedor.zona == 'Amazonas' %}selected{% endif %}>Amazonas</option>
                            <option value="Anzoátegui" {% if vendedor.zona == 'Anzoátegui' %}selected{% endif %}>Anzoátegui</option>
                            <option value="Apure" {% if vendedor.zona == 'Apure' %}selected{% endif %}>Apure</option>
                            <option value="Aragua" {% if vendedor.zona == 'Aragua' %}selected{% endif %}>Aragua</option>
                            <option value="Barinas" {% if vendedor.zona == 'Barinas' %}selected{% endif %}>Barinas</option>
                            <option value="Bolívar" {% if vendedor.zona == 'Bolívar' %}selected{% endif %}>Bolívar</option>
                            <option value="Carabobo" {% if vendedor.zona == 'Carabobo' %}selected{% endif %}>Carabobo</option>
                            <option value="Cojedes" {% if vendedor.zona == 'Cojedes' %}selected{% endif %}>Cojedes</option>
                            <option value="Delta Amacuro" {% if vendedor.zona == 'Delta Amacuro' %}selected{% endif %}>Delta Amacuro</option>
                            <option value="Distrito Capital" {% if vendedor.zona == 'Distrito Capital' %}selected{% endif %}>Distrito Capital</option>
                            <option value="Falcón" {% if vendedor.zona == 'Falcón' %}selected{% endif %}>Falcón</option>
                            <option value="Guárico" {% if vendedor.zona == 'Guárico' %}selected{% endif %}>Guárico</option>
                            <option value="Lara" {% if vendedor.zona == 'Lara' %}selected{% endif %}>Lara</option>
                            <option value="Mérida" {% if vendedor.zona == 'Mérida' %}selected{% endif %}>Mérida</option>
                            <option value="Miranda" {% if vendedor.zona == 'Miranda' %}selected{% endif %}>Miranda</option>
                            <option value="Monagas" {% if vendedor.zona == 'Monagas' %}selected{% endif %}>Monagas</option>
                            <option value="Nueva Esparta" {% if vendedor.zona == 'Nueva Esparta' %}selected{% endif %}>Nueva Esparta</option>
                            <option value="Portuguesa" {% if vendedor.zona == 'Portuguesa' %}selected{% endif %}>Portuguesa</option>
                            <option value="Sucre" {% if vendedor.zona == 'Sucre' %}selected{% endif %}>Sucre</option>
                            <option value="Táchira" {% if vendedor.zona == 'Táchira' %}selected{% endif %}>Táchira</option>
                            <option value="Trujillo" {% if vendedor.zona == 'Trujillo' %}selected{% endif %}>Trujillo</option>
                            <option value="Vargas" {% if vendedor.zona == 'Vargas' %}selected{% endif %}>Vargas</option>
                            <option value="Yaracuy" {% if vendedor.zona == 'Yaracuy' %}selected{% endif %}>Yaracuy</option>
                            <option value="Zulia" {% if vendedor.zona == 'Zulia' %}selected{% endif %}>Zulia</option>
                        </select>
                    </div>
                </div>

                <div class="pt-6 flex gap-4">
                    <a href="{{ url_for('admin.directorio') }}" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold text-center hover:bg-slate-200 transition-all">Cancelar</a>
                    <button type="submit" class="flex-[2] py-4 gold-gradient text-white rounded-2xl font-bold shadow-lg hover:brightness-105 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> Actualizar Perfil
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>lucide.createIcons();</script>
<script>
function adjustIdentificationLength(select) {
    const targetName = select.name === 'rif_tipo' ? 'rif_numero' : 'cedula_numero';
    const target = document.querySelector(`input[name="${targetName}"]`);
    if (!target) return;

    target.maxLength = select.value === 'V' ? 8 : 9;
    target.placeholder = select.value === 'V' ? '12345678' : '123456780';
}

function initIdentificationInputs() {
    document.querySelectorAll('select[name="rif_tipo"], select[name="cedula_tipo"]').forEach(function(select) {
        select.addEventListener('change', function() { adjustIdentificationLength(select); });
        if (select.value) {
            adjustIdentificationLength(select);
        }
    });
}

document.addEventListener('DOMContentLoaded', initIdentificationInputs);
</script>
</body>
</html>
