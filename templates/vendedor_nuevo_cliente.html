<!doctype html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Cliente | AMInventary</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #c9a84c 0%, #e8d5a3 50%, #c9a84c 100%); }
        .corporate-shadow { shadow-lg shadow-slate-200/50; }
    </style>
</head>
<body class="h-full bg-gray-50 text-slate-800">
    <div class="h-full w-full flex flex-col max-w-md mx-auto bg-white overflow-hidden relative shadow-2xl">
        
        <!-- Cabecera -->
        <header class="px-6 py-6 border-b border-gray-100 flex items-center justify-between bg-white">
            <div class="flex items-center gap-4">
                <a href="{{ url_for('vendedor.nueva_venta') }}" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 text-slate-400 hover:text-slate-900 transition-all">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>
                <div>
                    <h1 class="text-xl font-bold text-slate-900">Nuevo Cliente</h1>
                    <p class="text-[10px] font-bold text-[#c9a84c] uppercase tracking-widest">Registro de Cartera</p>
                </div>
            </div>
        </header>

        <form action="{{ url_for('vendedor.nuevo_cliente') }}" method="POST" class="flex-1 overflow-y-auto p-8 space-y-8">
            <!-- Instrucción -->
            <div class="bg-amber-50/50 border border-amber-100 p-4 rounded-2xl flex gap-3">
                <i data-lucide="info" class="w-5 h-5 text-[#c9a84c] shrink-0 mt-0.5"></i>
                <p class="text-xs text-amber-800 leading-relaxed">Todos los datos son obligatorios para poder procesar ventas a este cliente posteriormente.</p>
            </div>

            <!-- Campos -->
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.15em] ml-1">Nombre Completo</label>
                    <input type="text" name="nombre" placeholder="Ej. Clínica Dermalife" required 
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:ring-4 focus:ring-[#c9a84c]/10 focus:border-[#c9a84c] focus:bg-white transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.15em] ml-1">RIF / Cédula</label>
                        <input type="text" name="rif" placeholder="J-12345678-0" required 
                            class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:ring-4 focus:ring-[#c9a84c]/10 focus:border-[#c9a84c] focus:bg-white transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.15em] ml-1">Teléfono</label>
                        <input type="text" name="telefono" placeholder="0424..." required 
                            class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:ring-4 focus:ring-[#c9a84c]/10 focus:border-[#c9a84c] focus:bg-white transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.15em] ml-1">Estado / Zona</label>
                    <select name="estado" required 
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:ring-4 focus:ring-[#c9a84c]/10 focus:border-[#c9a84c] focus:bg-white transition-all appearance-none cursor-pointer">
                        <option value="">Seleccione...</option>
                        <option value="Amazonas">Amazonas</option>
                        <option value="Anzoátegui">Anzoátegui</option>
                        <option value="Apure">Apure</option>
                        <option value="Aragua">Aragua</option>
                        <option value="Barinas">Barinas</option>
                        <option value="Bolívar">Bolívar</option>
                        <option value="Carabobo">Carabobo</option>
                        <option value="Cojedes">Cojedes</option>
                        <option value="Delta Amacuro">Delta Amacuro</option>
                        <option value="Distrito Capital">Distrito Capital</option>
                        <option value="Falcón">Falcón</option>
                        <option value="Guárico">Guárico</option>
                        <option value="Lara">Lara</option>
                        <option value="Mérida">Mérida</option>
                        <option value="Miranda">Miranda</option>
                        <option value="Monagas">Monagas</option>
                        <option value="Nueva Esparta">Nueva Esparta</option>
                        <option value="Portuguesa">Portuguesa</option>
                        <option value="Sucre">Sucre</option>
                        <option value="Táchira">Táchira</option>
                        <option value="Trujillo">Trujillo</option>
                        <option value="Vargas">Vargas</option>
                        <option value="Yaracuy">Yaracuy</option>
                        <option value="Zulia">Zulia</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.15em] ml-1">Dirección Exacta</label>
                    <textarea name="direccion" required rows="3" placeholder="Av. Principal, Edif. Centro..." 
                        class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:ring-4 focus:ring-[#c9a84c]/10 focus:border-[#c9a84c] focus:bg-white transition-all resize-none"></textarea>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full py-5 gold-gradient text-slate-900 font-extrabold rounded-2xl shadow-xl shadow-[#c9a84c]/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i>
                    Guardar y Volver a la Venta
                </button>
            </div>
        </form>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
