<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMInventary - Editar Producto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar-dark { background-color: #0f172a; }
        .gold-gradient { background: linear-gradient(135deg, #c9a84c 0%, #e8d5a3 100%); }
        .corporate-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <!-- SIDEBAR (Simplified for Edit View) -->
    <aside class="w-72 sidebar-dark text-white flex flex-col shadow-2xl">
        <div class="p-8 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <img src="{{ url_for('static', filename='img/logo.png') }}" class="w-10 h-10 rounded-xl shadow-lg object-cover" onerror="this.src='https://ui-avatars.com/api/?name=AMI&background=c9a84c&color=fff'">
                <div>
                    <h2 class="text-xl font-bold tracking-tight">AMInventary</h2>
                    <p class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">Edición de Datos</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 px-4 py-8 space-y-2">
            <a href="{{ url_for('admin.reporte_inventario') }}" class="flex items-center gap-3 p-4 rounded-2xl text-slate-400 hover:bg-white/5 hover:text-white transition-all group">
                <i data-lucide="arrow-left" class="w-5 h-5 group-hover:text-[#c9a84c]"></i> Volver al Inventario
            </a>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto bg-[#f8fafc] flex items-center justify-center p-10">
        <div class="bg-white w-full max-w-2xl rounded-3xl border border-gray-100 corporate-shadow p-10">
            <div class="mb-10 border-b border-gray-100 pb-6 flex items-center gap-4">
                <div class="p-3 rounded-2xl bg-amber-50 text-[#c9a84c]">
                    <i data-lucide="package" class="w-6 h-6"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-extrabold text-slate-800">Editar Producto</h2>
                    <p class="text-sm text-gray-400">Modifique los campos necesarios para actualizar el registro.</p>
                </div>
            </div>

            <form class="space-y-6" method="POST">
                <div class="grid grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Código de Barras / SKU</label>
                        <input type="text" name="codigo" value="{{ producto.codigo }}" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Categoría</label>
                        <input type="text" name="categoria" value="{{ producto.categoria }}" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all">
                    </div>
                    <div class="flex flex-col gap-2 col-span-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Nombre del Producto</label>
                        <input type="text" name="nombre" value="{{ producto.nombre }}" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Precio Unitario ($)</label>
                        <input type="number" step="0.01" name="precio" value="{{ producto.precios }}" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all font-bold text-[#c9a84c]">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Comisión Vendedor ($)</label>
                        <input type="number" step="0.01" name="comision" value="{{ producto.comision }}" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all">
                    </div>
                    <div class="flex flex-col gap-2 col-span-2">
                        <label class="text-xs font-bold text-slate-700 uppercase tracking-wider">Stock Almacén Central</label>
                        <input type="number" name="stock" value="{{ producto.stock_central }}" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-[#c9a84c] outline-none transition-all">
                    </div>
                </div>

                <div class="pt-6 flex gap-4">
                    <a href="{{ url_for('admin.reporte_inventario') }}" class="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold text-center hover:bg-slate-200 transition-all">Cancelar</a>
                    <button type="submit" class="flex-[2] py-4 gold-gradient text-white rounded-2xl font-bold shadow-lg hover:brightness-105 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
